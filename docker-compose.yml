services:
  ai-bridge:
    build: .
    container_name: financial-news-ai-bridge
    restart: unless-stopped
    env_file:
      - .env
    volumes:
      - db_data:/app/data
    healthcheck:
      test: ["CMD", "curl", "-f", "http://localhost:${PORT:-8000}/health"]
      interval: 30s
      timeout: 10s
      start_period: 15s
      retries: 3
    ports:
      - "${PORT:-8000}:${PORT:-8000}"
    stop_grace_period: 30s

volumes:
  db_data:
    driver: local
