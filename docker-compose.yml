version: '3.8'

services:
  ai-bridge:
    build: .
    container_name: financial-news-ai-bridge
    restart: unless-stopped
    env_file:
      - .env
    volumes:
      - ./data:/app/data
    healthcheck:
      test: ["CMD", "curl", "-f", "http://localhost:${PORT:-8000}/health"]
      interval: 30s
      timeout: 10s
      retries: 3
    ports:
      - "${PORT:-8000}:${PORT:-8000}"
